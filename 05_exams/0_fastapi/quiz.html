<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MCQ Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 { margin-bottom: 20px; }

    label { display: block; margin-top: 10px; font-weight: bold; }

    input, select {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 8px 20px;
      cursor: pointer;
    }

    #error { color: red; margin-top: 10px; }

    #quiz { display: none; }

    .question { margin-bottom: 25px; }

    .question p { font-weight: bold; margin-bottom: 8px; }

    .question label { font-weight: normal; cursor: pointer; }

    #result { display: none; margin-top: 20px; }
  </style>
</head>
<body>

<div id="login">
  <h2>MCQ Quiz</h2>

  <label>Username</label>
  <input type="text" id="username" value="alice">

  <label>Password</label>
  <input type="password" id="password" value="wonderland">

  <label>Test type</label>
  <input type="text" id="use" value="Positioning test">

  <label>Subject(s) <small>(comma-separated)</small></label>
  <input type="text" id="subjects" placeholder="e.g. Databases,Distributed systems">

  <label>Number of questions</label>
  <select id="n">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="20">20</option>
  </select>

  <br>
  <button onclick="startQuiz()">Start</button>
  <div id="error"></div>
</div>

<div id="quiz">
  <h2>Questions</h2>
  <div id="questions-container"></div>
  <button onclick="submitQuiz()">Submit</button>
  <div id="result"></div>
  <br>
  <button onclick="resetQuiz()" style="display:none" id="restart-btn">Start over</button>
</div>

<script>
  let questions = [];

  async function startQuiz() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const use  = document.getElementById('use').value;
    const subj = document.getElementById('subjects').value;
    const n    = document.getElementById('n').value;

    document.getElementById('error').textContent = '';

    try {
      const res = await fetch(
        `http://localhost:8000/mcq?use=${encodeURIComponent(use)}&subjects=${encodeURIComponent(subj)}&n=${n}`,
        { headers: { 'Authorization': `Basic ${user}:${pass}` } }
      );

      if (!res.ok) {
        const data = await res.json();
        document.getElementById('error').textContent = 'Error: ' + (data.detail || res.status);
        return;
      }

      questions = await res.json();

      document.getElementById('login').style.display = 'none';
      document.getElementById('quiz').style.display = 'block';
      renderQuestions();

    } catch (e) {
      document.getElementById('error').textContent = 'Could not connect to server.';
    }
  }

  function renderQuestions() {
    const container = document.getElementById('questions-container');
    container.innerHTML = '';

    questions.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'question';

      const keys = ['A','B','C','D'];
      const answers = [q.answerA, q.answerB, q.answerC, q.answerD];

      let optionsHTML = '';
      answers.forEach((a, j) => {
        if (a && a.trim() !== '') {
          optionsHTML += `
            <label>
              <input type="radio" name="q${i}" value="${keys[j]}">
              ${keys[j]}) ${a}
            </label><br>`;
        }
      });

      div.innerHTML = `<p>${i + 1}. ${q.question}</p>${optionsHTML}`;
      container.appendChild(div);
    });

    document.getElementById('result').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
  }

  function submitQuiz() {
    let correct = 0;
    let unanswered = 0;

    questions.forEach((q, i) => {
      const selected = document.querySelector(`input[name="q${i}"]:checked`);
      if (!selected) {
        unanswered++;
      } else if (selected.value === q.correct) {
        correct++;
      }
    });

    if (unanswered > 0) {
      if (!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
    }

    const result = document.getElementById('result');
    result.style.display = 'block';
    result.innerHTML = `<strong>Result: ${correct} / ${questions.length} correct</strong>`;

    document.getElementById('restart-btn').style.display = 'inline';
  }

  function resetQuiz() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('login').style.display = 'block';
  }
</script>

</body>
</html>
